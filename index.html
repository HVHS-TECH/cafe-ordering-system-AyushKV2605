<!DOCTYPE html>
<html>
<head>
  <title>Page Title</title>
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <h1>Welcome to The Pizza House</h1>
  <div class="container">
    <img src="Screenshot 2026-06-12 091452.png" alt="Poster">
    <ol>
      <li class="types">Cheesy Garlic Pizza - $15.80</li>
      <li class="types">Pepperoni Pizza - $14.99</li>
      <li class="types">Hot & Spicy Pizza - $16.00</li>
      <li class="types">BBQ Meatlovers Pizza - $15.00</li>
      <li class="types">Margherita Pizza - $16.99</li>
      <li class="types">Hawaiian Pizza - $15.99</li>
    </ol>

    <div class="order-panel">
      <form id="orderForm" onsubmit="submitOrder(event)">
        <label for="nameField"></label>
        <input type="text" id="nameField" name="formName" placeholder="Name">

        <label for="orderField"></label>
        <input type="text" id="orderField" name="formOrder" placeholder="Order">

        <label for="quantityField"></label>
        <input type="number" id="quantityField" name="formQuantity" placeholder="Quantity" min="1">

        <input type="submit" value="Submit Order">
      </form>

      <div id="spaceForJavaScriptOutput"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
