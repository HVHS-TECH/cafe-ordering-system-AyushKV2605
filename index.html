<!DOCTYPE html>
<html>
<head>
  <title>Page Title</title>
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <h1>Welcome to The Pizza House</h1>
  <div class="container">
    <img src="Screenshot 2026-06-12 091452.png" alt="Poster">
    <ol>
      <li class="types">Cheesy Garlic Pizza - $15.80</li>
      <li class="types">Pepperoni Pizza - $14.99</li>
      <li class="types">Hot & Spicy Pizza - $16.00</li>
      <li class="types">BBQ Meatlovers Pizza - $15.00</li>
      <li class="types">Margherita Pizza - $16.99</li>
      <li class="types">Hawaiian Pizza - $15.99</li>
    </ol>

    <form id="orderForm">
  <label for="nameField">Name:</label>
  <input type="text" id="nameField" placeholder="Enter your name">
  <label for="pizzatype">Pizza Type:</label>
  <input type="text" id="pizzatype" placeholder="Enter pizza type">
  <label for="quantity">Quantity:</label>
  <input type="text" id="quantity" placeholder="Enter quantity">
  <label for="money">Money:</label>
  <input type="text" id="money" placeholder="Enter amount of money">
  <input type="submit" value="Submit Order">
</form>
  </div>

  <div id="spaceForJavaScriptOutput"></div>

  <script src="script.js"></script>
</body>
</html>
